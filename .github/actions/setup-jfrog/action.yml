# =============================================================================
# JFROG ARTIFACTORY SETUP (COMPOSITE ACTION)
# =============================================================================
#
# PURPOSE:
#   Authenticates with JFrog Artifactory via GitHub OIDC and configures
#   package managers (pip, uv, npm, Terraform) to use JFrog as their
#   registry/mirror. This replaces direct access to public registries
#   which is blocked on hardened GitHub Actions runners.
#
# PREREQUISITES:
#   - The calling job MUST have `permissions: id-token: write` to allow
#     GitHub OIDC token generation.
#   - The repository's GitHub org must be onboarded to JFrog (see go/hardened-gha).
#
# USAGE:
#   - name: Setup JFrog Artifactory
#     uses: ./.github/actions/setup-jfrog
#     with:
#       configure-pip: 'true'       # default
#       configure-uv: 'true'        # default
#       configure-npm: 'true'       # default
#       configure-terraform: 'true' # default
#
# REFERENCE:
#   https://go/hardened-gha
#
# =============================================================================

name: 'Setup JFrog Artifactory'
description: 'Authenticate with JFrog via OIDC and configure package managers'

inputs:
  configure-pip:
    description: 'Configure pip to use JFrog PyPI registry'
    required: false
    default: 'true'
  configure-uv:
    description: 'Configure uv to use JFrog PyPI registry'
    required: false
    default: 'true'
  configure-npm:
    description: 'Configure npm to use JFrog npm registry'
    required: false
    default: 'true'
  configure-terraform:
    description: 'Configure Terraform to use JFrog provider mirror'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Get JFrog OIDC token
      shell: bash
      run: |
        set -euo pipefail

        # Get GitHub OIDC ID token
        ID_TOKEN=$(curl -sLS \
          -H "User-Agent: actions/oidc-client" \
          -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
        echo "::add-mask::${ID_TOKEN}"

        # Exchange for JFrog access token (note: id_token with underscore, not hyphen)
        ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
          "https://databricks.jfrog.io/access/api/v1/oidc/token" \
          -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
        echo "::add-mask::${ACCESS_TOKEN}"

        if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
          echo "FAIL: Could not extract JFrog access token"
          exit 1
        fi

        echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"

        echo "JFrog OIDC token obtained successfully"

    - name: Configure pip
      if: inputs.configure-pip == 'true'
      shell: bash
      run: |
        set -euo pipefail

        echo "PIP_INDEX_URL=https://gha-service-account:${JFROG_ACCESS_TOKEN}@databricks.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> "$GITHUB_ENV"

        echo "pip configured to use JFrog registry"

    - name: Configure uv
      if: inputs.configure-uv == 'true'
      shell: bash
      run: |
        set -euo pipefail

        echo "UV_INDEX_URL=https://gha-service-account:${JFROG_ACCESS_TOKEN}@databricks.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> "$GITHUB_ENV"

        echo "uv configured to use JFrog registry"

    - name: Configure npm
      if: inputs.configure-npm == 'true'
      shell: bash
      run: |
        set -euo pipefail

        cat > ~/.npmrc << EOF
        registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/
        //databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${JFROG_ACCESS_TOKEN}
        always-auth=true
        EOF

        echo "npm configured to use JFrog registry"

    - name: Configure Terraform
      if: inputs.configure-terraform == 'true'
      shell: bash
      run: |
        set -euo pipefail

        # Configure Terraform CLI to use JFrog as a provider mirror
        cat > ~/.terraformrc << EOF
        provider_installation {
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
          network_mirror {
            url = "https://databricks.jfrog.io/artifactory/api/terraform/db-terraform/providers/"
          }
        }
        EOF

        # Configure credentials for the JFrog Terraform registry
        mkdir -p ~/.terraform.d
        cat > ~/.terraform.d/credentials.tfrc.json << EOF
        {
          "credentials": {
            "databricks.jfrog.io": {
              "token": "${JFROG_ACCESS_TOKEN}"
            }
          }
        }
        EOF

        echo "Terraform configured to use JFrog registry"
