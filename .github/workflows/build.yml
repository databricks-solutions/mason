name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Workflow-level default is read-only. Each build job widens to contents:write
# only because it uploads its installer to the release tag, and to id-token:
# write so the JFrog OIDC step in setup-jfrog can mint a short-lived token.
permissions:
  contents: read

jobs:
  build-mac:
    # Org has no hardened macOS runner group today (per Gerardo's interim
    # guidance — tracked in the IT scenario doc). Continue using the
    # github-hosted runner; npm still flows through JFrog via OIDC.
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write  # JFrog OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 (pin)
      - name: Configure JFrog npm registry (OIDC)
        uses: ./.github/actions/setup-jfrog
        with:
          configure-npm: 'true'
          configure-pip: 'false'
          configure-uv: 'false'
          configure-terraform: 'false'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4 (pin)
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Verify npm package signatures
        run: npm audit signatures
      - name: Build, sign & notarize macOS
        run: npm run build:mac
        env:
          # Apple Developer ID code signing certificate (base64-encoded .p12) + password.
          # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD automatically.
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # Apple notary service credentials (used by electron-builder when notarize: true).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2 (pin)
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/*.dmg
            dist/*.zip

  build-win:
    # Org has no hardened Windows runner today (Gerardo interim guidance).
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write  # JFrog OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 (pin)
      - name: Configure JFrog npm registry (OIDC)
        uses: ./.github/actions/setup-jfrog
        with:
          configure-npm: 'true'
          configure-pip: 'false'
          configure-uv: 'false'
          configure-terraform: 'false'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4 (pin)
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Verify npm package signatures
        run: npm audit signatures
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2 (pin)
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*.exe

  build-linux:
    # Hardened Linux runner group for the databricks-solutions org.
    runs-on:
      group: databricks-solutions-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      contents: write
      id-token: write  # JFrog OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 (pin)
      - name: Configure JFrog npm registry (OIDC)
        uses: ./.github/actions/setup-jfrog
        with:
          configure-npm: 'true'
          configure-pip: 'false'
          configure-uv: 'false'
          configure-terraform: 'false'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4 (pin)
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Verify npm package signatures
        run: npm audit signatures
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2 (pin)
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*.AppImage
