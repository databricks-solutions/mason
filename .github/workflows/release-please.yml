name: Release Please

on:
  push:
    branches:
      - main

# Default read-only at workflow level; widen only on the release-please job.
permissions:
  contents: read

jobs:
  release-please:
    # Hardened Linux runner group for the databricks-solutions org.
    runs-on:
      group: databricks-solutions-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4 (pin)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
